server {
    listen 80;
    server_name [IP_VM1];

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/osboxes/sae-trafic-aerien/SAE_Trafic_Aerien/staticfiles/;
    }

    location /media/ {
        alias /home/osboxes/sae-trafic-aerien/SAE_Trafic_Aerien/media/;
    }
}
